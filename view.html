<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>Planning - Cleaning Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- No SDK needed - direct REST API calls -->
<style>
  :root { --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#16213e; --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1); --accent:#e94560; --text:#f0f0f5; --text2:#9ca3af; --text3:#6b7280; --success:#34d399; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; font-size:14px; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }
  .container { max-width:700px; margin:0 auto; }
  .header { background:linear-gradient(135deg,#1a1a2e,#0f3460); padding:20px 24px; border-radius:16px; margin-bottom:20px; text-align:center; }
  .header h1 { color:#fff; font-size:20px; margin-bottom:4px; }
  .header .sub { color:rgba(255,255,255,0.5); font-size:12px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; color:#fff; }
  .badge.airbnb { background:#e94560; }
  .badge.booking { background:#003580; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .card .date { font-weight:700; font-size:15px; color:var(--accent); min-width:120px; }
  .card .day { color:var(--text2); font-size:12px; }
  .card .details { font-size:13px; color:var(--text2); }
  .card .provider { background:var(--surface2); padding:4px 12px; border-radius:8px; font-size:12px; font-weight:600; color:var(--success); }
  .empty { text-align:center; color:var(--text3); padding:40px; }
  .loading { text-align:center; color:var(--text3); padding:40px; }
  .error { text-align:center; color:var(--accent); padding:40px; }
  .info { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:16px; text-align:center; color:var(--text2); font-size:13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Cleaning Manager</h1>
    <div class="sub" id="subtitle">Chargement...</div>
  </div>
  <div id="content"><div class="loading">Chargement du planning...</div></div>
</div>
<script>
const SUPABASE_URL_VIEW = 'https://mrvejwyvhuivmipfwlzz.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ydmVqd3l2aHVpdm1pcGZ3bHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjU0NTksImV4cCI6MjA4OTg0MTQ1OX0.1pi-KN5N6sNG6hIu6N0wDsR_g_G1TTf-uPecmWQ2ovU';

const params = new URLSearchParams(window.location.search);
const readonlyToken = params.get('readonly');
const providerToken = params.get('provider');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

let validations = {};
let matchedPropertyId = null;

async function loadValidations(propId) {
  try {
    const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/cleaning_validations?property_id=eq.${propId}&select=*`, {
      headers: { 'apikey': ANON_KEY }
    });
    const data = await resp.json();
    if (Array.isArray(data)) {
      data.forEach(v => {
        validations[v.cleaning_date + '_' + v.provider_name] = v;
      });
    }
  } catch (e) { console.error('loadValidations:', e); }
}

async function validateCleaning(date, provider, status) {
  try {
    const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/cleaning_validations`, {
      method: 'POST',
      headers: {
        'apikey': ANON_KEY,
        'Authorization': 'Bearer ' + ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
      },
      body: JSON.stringify({
        property_id: matchedPropertyId,
        cleaning_date: date,
        provider_name: provider,
        status: status,
        validated_at: new Date().toISOString(),
      }),
    });
    const data = await resp.json();
    if (data && !data.error) {
      validations[date + '_' + provider] = data[0] || data;
      loadData(); // Refresh
    }
  } catch (e) { console.error('validateCleaning:', e); alert('Erreur: ' + e.message); }
}

async function uploadPhotos(input, date, provider) {
  // Convert to base64 and store in validation
  const files = input.files;
  if (!files.length) return;
  const photos = [];
  for (const file of files) {
    const reader = new FileReader();
    const b64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result); reader.readAsDataURL(file); });
    photos.push(b64);
  }
  // Update validation with photos
  const key = date + '_' + provider;
  const existing = validations[key];
  if (existing && existing.id) {
    await fetch(`${SUPABASE_URL_VIEW}/rest/v1/cleaning_validations?id=eq.${existing.id}`, {
      method: 'PATCH',
      headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ photos: [...(existing.photos||[]), ...photos] }),
    });
  }
  loadData();
}

async function loadData() {
  const content = document.getElementById('content');
  const subtitle = document.getElementById('subtitle');

  if (!readonlyToken && !providerToken) {
    content.innerHTML = '<div class="error">Lien invalide. Aucun token fourni.</div>';
    subtitle.textContent = 'Erreur';
    return;
  }

  try {
    let found = null;
    let providerName = null;
    let matchedProp = null;
    let matchedPlanning = [];

    // Phase 2: Search in properties table by token (secure - only returns matching property)
    if (readonlyToken) {
      const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/properties?readonly_token=eq.${encodeURIComponent(readonlyToken)}&select=id,name,providers,plannings(cleanings,transmitted)`, {
        headers: { 'apikey': ANON_KEY }
      });
      const props = await resp.json();
      if (props && props.length > 0) {
        const p = props[0];
        found = true;
        matchedProp = { id: p.id, name: p.name, providers: p.providers || [] };
        matchedPlanning = (p.plannings && p.plannings[0]) ? (p.plannings[0].cleanings || []) : [];
      }
    }

    if (providerToken && !found) {
      // Search all properties for this provider token
      const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/properties?select=id,name,providers,plannings(cleanings)`, {
        headers: { 'apikey': ANON_KEY }
      });
      const allProps = await resp.json();
      if (Array.isArray(allProps)) {
        for (const p of allProps) {
          const prov = (p.providers || []).find(pr => pr.token === providerToken);
          if (prov) {
            found = true;
            matchedProp = { id: p.id, name: p.name, providers: p.providers || [] };
            providerName = prov.name;
            matchedPlanning = (p.plannings && p.plannings[0]) ? (p.plannings[0].cleanings || []) : [];
            break;
          }
        }
      }
    }

    // Fallback: legacy user_data table
    if (!found) {
      const resp = await fetch(`${SUPABASE_URL_VIEW}/rest/v1/user_data?select=config,planning`, {
        headers: { 'apikey': ANON_KEY }
      });
      const allData = await resp.json();
      for (const row of allData) {
        const cfg = row.config || {};
        const props = cfg.properties || [];
        const planningData = row.planning || {};
        for (const prop of props) {
          if (readonlyToken && prop.readonlyToken === readonlyToken) {
            found = true; matchedProp = prop;
            matchedPlanning = Array.isArray(planningData) ? planningData : (planningData[prop.id] || []);
            break;
          }
          if (providerToken) {
            const prov = (prop.providers || []).find(p => p.token === providerToken);
            if (prov) {
              found = true; matchedProp = prop; providerName = prov.name;
              matchedPlanning = Array.isArray(planningData) ? planningData : (planningData[prop.id] || []);
              break;
            }
          }
        }
        if (!found && !props.length) {
          if (readonlyToken && cfg.readonlyToken === readonlyToken) {
            found = true; matchedPlanning = Array.isArray(row.planning) ? row.planning : [];
            matchedProp = { name: cfg.property || 'Planning', providers: cfg.providers || [] };
          }
          if (providerToken) {
            const prov = (cfg.providers || []).find(p => p.token === providerToken);
            if (prov) {
              found = true; providerName = prov.name;
              matchedPlanning = Array.isArray(row.planning) ? row.planning : [];
            matchedProp = { name: cfg.property || 'Planning', providers: cfg.providers || [] };
          }
        }
      }
      if (found) break;
    }

    if (!found) {
      content.innerHTML = '<div class="error">Planning introuvable. Le lien est peut-etre expire.</div>';
      subtitle.textContent = 'Non trouve';
      return;
    }

    const property = (matchedProp && matchedProp.name) || 'Planning';
    // Load validations for this property
    if (matchedProp && matchedProp.id) { matchedPropertyId = matchedProp.id; await loadValidations(matchedProp.id); }

    // Filter for provider view
    let displayCleanings = matchedPlanning;
    if (providerName) {
      displayCleanings = matchedPlanning.filter(c => c.provider === providerName);
      subtitle.textContent = `Planning de ${esc(providerName)} - ${esc(property)}`;
      document.title = `Planning ${providerName} - Cleaning Manager`;
    } else {
      subtitle.textContent = `Planning complet - ${esc(property)}`;
      document.title = `Planning ${property} - Cleaning Manager`;
    }

    // Sort by date
    displayCleanings.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

    // Filter future only
    const today = new Date().toISOString().split('T')[0];
    displayCleanings = displayCleanings.filter(c => (c.date || '') >= today);

    if (!displayCleanings.length) {
      content.innerHTML = '<div class="empty">Aucun menage a venir.</div>';
      return;
    }

    let html = `<div class="info">${displayCleanings.length} menage(s) a venir</div>`;
    for (const c of displayCleanings) {
      const source = (c.source || '').toLowerCase();
      const badgeClass = source.includes('airbnb') ? 'airbnb' : source.includes('booking') ? 'booking' : '';
      const isProvider = !!providerToken;
      const today = new Date().toISOString().split('T')[0];
      const isToday = (c.cleaningDate || c.date) === today;
      const isPast = (c.cleaningDate || c.date) < today;
      const cleaningId = (c.cleaningDate || c.date) + '_' + (c.provider || '');
      const validation = validations[cleaningId];
      const statusIcon = validation ? (validation.status === 'done' ? '&#9989;' : validation.status === 'in_progress' ? '&#9203;' : '&#9898;') : '&#9898;';
      const statusText = validation ? (validation.status === 'done' ? 'Termine' : validation.status === 'in_progress' ? 'En cours' : 'A faire') : 'A faire';
      const statusColor = validation && validation.status === 'done' ? '#34d399' : validation && validation.status === 'in_progress' ? '#f59e0b' : 'var(--text3)';

      html += `
        <div class="card" style="flex-direction:column;align-items:stretch;${isToday ? 'border-left:3px solid #e94560;' : ''}">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div class="date">${esc(c.dayName || '')} ${fmtDate(c.date)}</div>
              <div class="details">
                <span class="badge ${badgeClass}">${esc(c.source || '')}</span>
                Arrivee: ${fmtDate(c.date)} &rarr; Depart: ${fmtDate(c.checkoutDate)}
              </div>
            </div>
            <div style="text-align:right;">
              <div class="provider">${esc(c.provider || '?')}</div>
              <div style="font-size:11px;color:${statusColor};margin-top:4px;">${statusIcon} ${statusText}</div>
            </div>
          </div>
          ${isProvider && !isPast && (!validation || validation.status !== 'done') ? `
            <div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
              <button onclick="validateCleaning('${c.cleaningDate||c.date}','${esc(c.provider||'')}','in_progress')" style="flex:1;padding:10px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#128692; En route</button>
              <button onclick="validateCleaning('${c.cleaningDate||c.date}','${esc(c.provider||'')}','done')" style="flex:1;padding:10px;background:#34d399;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">&#9989; Termine</button>
            </div>
            <div style="margin-top:8px;">
              <input type="file" accept="image/*" multiple id="photos_${cleaningId.replace(/[^a-zA-Z0-9]/g,'_')}" style="font-size:11px;color:var(--text3);" onchange="uploadPhotos(this,'${c.cleaningDate||c.date}','${esc(c.provider||'')}')">
            </div>
          ` : ''}
          ${validation && validation.photos && validation.photos.length ? `
            <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
              ${validation.photos.map(p => `<img src="${p}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">`).join('')}
            </div>
          ` : ''}
        </div>`;
    }
    content.innerHTML = html;

  } catch (e) {
    content.innerHTML = `<div class="error">Erreur: ${e.message}</div>`;
    subtitle.textContent = 'Erreur';
  }
}

loadData();
</script>
</body>
</html>
